<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pennant Manager DX Complete</title>
  <style>
    :root{
      --bg1:#16365c; --bg2:#0b1423; --bg3:#040912;
      --line:rgba(255,255,255,.08); --line2:rgba(255,255,255,.05);
      --text:#edf6ff; --muted:#9fb6cb; --blue:#7dcaff; --blue2:#dff3ff;
      --gold:#ffd66c; --green:#88ecb1; --red:#ff9ca2; --orange:#ffb66c; --purple:#c8adff;
      --ball:#61dd74; --strike:#ffd25f; --out:#ff6d6d;
      --shadow:0 22px 54px rgba(0,0,0,.34);
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{height:100%}
    body{
      margin:0; padding:12px; color:var(--text);
      font-family:"Hiragino Sans","Yu Gothic UI","Meiryo",system-ui,sans-serif;
      background:
        radial-gradient(circle at top, rgba(98,172,255,.22), transparent 22%),
        radial-gradient(circle at left bottom, rgba(255,214,108,.08), transparent 20%),
        linear-gradient(180deg,var(--bg1),var(--bg2) 42%,var(--bg3));
    }
    .app{
      width:min(1500px,100%); margin:0 auto; display:grid;
      grid-template-columns:300px 1fr; gap:12px;
    }
    .card{
      background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.02));
      border:1px solid var(--line); border-radius:22px;
      box-shadow:var(--shadow); backdrop-filter:blur(10px);
    }
    .sidebar,.main{ padding:14px; display:flex; flex-direction:column; gap:12px; }
    .hero{
      padding:18px; border-radius:18px;
      background:linear-gradient(135deg,#173659,#214d7b 58%,#3a8fdb);
      border:1px solid rgba(255,255,255,.12); position:relative; overflow:hidden;
    }
    .hero::after{
      content:""; position:absolute; right:-30px; top:-30px; width:180px; height:180px;
      border-radius:50%; background:radial-gradient(circle,rgba(255,255,255,.18),transparent 70%);
      pointer-events:none;
    }
    .logo{ font-size:30px; font-weight:900; line-height:1.02; letter-spacing:.04em; }
    .logo span{color:var(--blue2)}
    .sub{ margin-top:8px; font-size:12px; line-height:1.75; color:rgba(235,246,255,.82); }
    .box,.panel,.stage{
      padding:13px; border-radius:18px;
      background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.02));
      border:1px solid var(--line2);
    }
    .title{
      font-size:12px; letter-spacing:.12em; text-transform:uppercase;
      color:var(--blue2); font-weight:900; margin-bottom:8px;
    }
    .scoreboard{
      padding:12px 14px; border-radius:18px;
      background: linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02)), linear-gradient(180deg,#15355a,#09121f);
      border:1px solid rgba(255,255,255,.10);
      display:grid; grid-template-columns:1fr auto auto auto auto auto auto; align-items:center; gap:8px;
    }
    .team-label{ font-weight:900; font-size:15px; color:#f6fbff; letter-spacing:.03em; }
    .pill,.score-big{ border-radius:999px; border:1px solid rgba(255,255,255,.08); white-space:nowrap; }
    .pill{ padding:6px 10px; font-size:12px; color:var(--muted); background:rgba(255,255,255,.06); }
    .score-big{
      padding:5px 0; min-width:54px; text-align:center; font-size:29px; font-weight:900;
      color:var(--gold); background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.03));
    }
    .top-panels,.game-layout{ display:grid; gap:12px; }
    .top-panels{grid-template-columns:1.18fr .82fr}
    .game-layout{grid-template-columns:1.03fr .97fr}
    .stage{ min-height:520px; background:linear-gradient(180deg,rgba(8,14,25,.92),rgba(5,10,18,.98)); display:flex; flex-direction:column; }
    .headline{ font-size:20px; font-weight:900; color:var(--blue2); margin-bottom:10px; display:flex; align-items:center; justify-content:space-between; }
    .event-badge{ font-size:11px; padding:3px 8px; border-radius:4px; background:var(--gold); color:#000; font-weight:bold; letter-spacing:0.05em; }
    .narration{
      padding:14px; border-radius:16px; border:1px solid var(--line);
      background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,.015));
      line-height:1.85; min-height:160px; white-space:pre-wrap; flex-grow: 1; overflow-y:auto;
    }
    .event-narration {
      text-align: center; display: flex; flex-direction: column; justify-content: center; align-items: center;
      font-size: 16px; font-weight: bold; color: var(--gold); text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    }
    .mini-row{ display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }
    .chip{
      padding:7px 10px; border-radius:999px; background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.06); font-size:12px; color:var(--muted);
    }
    .trait-chip{ background:linear-gradient(135deg, #4b3000, #2a1b00); border-color:var(--gold); color:var(--gold); }
    .actions{ display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; }
    .actions.secondary{ display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:8px; }
    button{
      appearance:none; border:none; border-radius:12px; padding:11px 14px;
      font-size:14px; font-weight:900; cursor:pointer; color:#082031;
      background:linear-gradient(180deg,#aee5ff,#72c9ff);
      box-shadow:0 8px 20px rgba(0,0,0,.18), inset 0 1px 0 rgba(255,255,255,.22);
    }
    button.secondary{ background:linear-gradient(180deg,rgba(255,255,255,.10),rgba(255,255,255,.05)); border:1px solid rgba(255,255,255,.08); color:var(--text); }
    button.gold{background:linear-gradient(180deg,#ffe6a2,#ffd66c)}
    button.green{background:linear-gradient(180deg,#bcf2cf,#88ecb1)}
    button.red{background:linear-gradient(180deg,#ffbdc2,#ff9198)}
    button.purple{background:linear-gradient(180deg,#e4d6ff,#c8adff)}
    button.orange{background:linear-gradient(180deg,#ffd6a8,#ffb66c)}
    button:disabled{opacity:.45;cursor:not-allowed;box-shadow:none}
    .fieldWrap{display:grid;gap:10px}
    .diamond{ width:150px; height:150px; margin:0 auto; position:relative; }
    .base{ width:22px; height:22px; border-radius:4px; transform:rotate(45deg); position:absolute; background:rgba(255,255,255,.08); border:2px solid rgba(255,255,255,.20); }
    .base.active{ background:rgba(255,214,108,.95); box-shadow:0 0 14px rgba(255,214,108,.45); }
    .base.home{left:64px;bottom:0} .base.first{right:0;top:64px} .base.second{left:64px;top:0} .base.third{left:0;top:64px}
    .diamond-label{ position:absolute; font-size:11px; color:var(--muted); }
    .l1{right:-10px;top:88px} .l2{left:66px;top:-16px} .l3{left:-10px;top:88px} .lh{left:56px;bottom:-20px}
    .row{ display:grid; grid-template-columns:1fr auto; gap:8px; font-size:13px; align-items:center; }
    .mini-grid{ display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:8px; }
    .smallbox,.player-card,.save-slot{
      padding:10px; border-radius:14px; border:1px solid rgba(255,255,255,.06);
      background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,.02));
    }
    .player-name{font-weight:900;margin-bottom:4px;display:flex;justify-content:space-between;}
    .trait-tag { font-size:10px; color:var(--gold); border:1px solid var(--gold); padding:1px 4px; border-radius:4px;}
    .tiny{font-size:12px;color:var(--muted);line-height:1.6}
    .inning-board{ display:grid; grid-template-columns:repeat(9,1fr); gap:4px; }
    .inning-cell{ padding:6px 4px; text-align:center; font-size:12px; border-radius:8px; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.04); }
    .log{ height:380px; overflow:auto; display:flex; flex-direction:column; gap:8px; }
    .log-line{ padding:9px 10px; border-radius:12px; background:rgba(255,255,255,.035); font-size:13px; line-height:1.6; }
    .good{border-left:3px solid var(--green)} .bad{border-left:3px solid var(--red)}
    .em{border-left:3px solid var(--gold)} .special{border-left:3px solid var(--purple)}
    .save-grid,.standings,.bench-list{display:grid;gap:8px}
    .slot-actions{ display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }
    .tvline{
      display:flex; align-items:center; gap:10px; flex-wrap:wrap; padding:10px 12px;
      border-radius:16px; background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,.015)); border:1px solid var(--line);
    }
    .tvlabel{ font-size:12px; color:var(--blue2); font-weight:900; letter-spacing:.12em; }
    .countWrap{ display:flex; gap:14px; align-items:center; flex-wrap:wrap; }
    .group{ display:flex; align-items:center; gap:6px; }
    .group span{ font-size:12px; color:var(--muted); font-weight:900; width:16px; }
    .lamp{ width:14px; height:14px; border-radius:50%; background:#273241; box-shadow:inset 0 0 0 1px rgba(255,255,255,.08),0 1px 3px rgba(0,0,0,.35); }
    .lamp.ball.on{background:var(--ball);box-shadow:0 0 12px rgba(97,221,116,.6)}
    .lamp.strike.on{background:var(--strike);box-shadow:0 0 12px rgba(255,210,95,.6)}
    .lamp.out.on{background:var(--out);box-shadow:0 0 12px rgba(255,109,109,.6)}
    
    .credits-container { height: 160px; overflow: hidden; position: relative; }
    .credits-scroll { position: absolute; width: 100%; text-align: center; animation: scrollUp 15s linear forwards; }
    @keyframes scrollUp { 0% { top: 160px; } 100% { top: -400px; } }

    @media (max-width:1180px){ .app,.top-panels,.game-layout{grid-template-columns:1fr} }
    @media (max-width:760px){
      body{padding:8px} .scoreboard{grid-template-columns:1fr auto auto}
      .actions.secondary{grid-template-columns:1fr} .mini-grid{grid-template-columns:1fr}
      .slot-actions button,.actions button{width:100%}
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar card">
      <section class="hero">
        <div class="logo">PENNANT<br><span>MANAGER DX</span></div>
        <div class="sub">監督としてサインを出し、カウントを読み、投手のスタミナや守備力、選手の「特性」を見極めて日本一を目指す本格監督ゲーム。</div>
      </section>
      <section class="box">
        <div class="title">League Standing</div>
        <div class="standings" id="standingsBox"></div>
      </section>
      <section class="box">
        <div class="title">Save / Load</div>
        <div class="save-grid" id="saveSlots"></div>
      </section>
    </aside>

    <main class="main card">
      <section class="scoreboard">
        <div class="team-label" id="scoreLabel">TOKYO BLUE STARS 監督室</div>
        <div class="pill" id="phasePill">TITLE</div>
        <div class="pill" id="modePill">AUTO</div>
        <div class="pill" id="pitchTypePill">-</div>
        <div class="pill" id="inningPill">1回表</div>
        <div class="score-big" id="homeScore">0</div>
        <div class="score-big" id="awayScore">0</div>
      </section>

      <div class="top-panels">
        <section class="stage">
          <div class="headline" id="headlineContainer">
            <span id="headline">監督室</span>
            <span id="eventBadge" class="event-badge" style="display:none;">EVENT</span>
          </div>
          <div class="narration" id="narration"></div>

          <div class="tvline" id="tvline">
            <div class="tvlabel">B S O</div>
            <div class="countWrap">
              <div class="group"><span>B</span><i class="lamp ball" id="b1"></i><i class="lamp ball" id="b2"></i><i class="lamp ball" id="b3"></i><i class="lamp ball" id="b4"></i></div>
              <div class="group"><span>S</span><i class="lamp strike" id="s1"></i><i class="lamp strike" id="s2"></i><i class="lamp strike" id="s3"></i></div>
              <div class="group"><span>O</span><i class="lamp out" id="o1"></i><i class="lamp out" id="o2"></i><i class="lamp out" id="o3"></i></div>
            </div>
          </div>

          <div class="mini-row" id="miniRow">
            <div class="chip" id="batterChip">打者 -</div>
            <div class="chip" id="pitcherChip">投手 -</div>
            <div class="chip" id="baseChip">走者なし</div>
          </div>

          <div class="actions" id="primaryActions"></div>
          <div class="actions secondary" id="secondaryActions"></div>
        </section>

        <section class="panel">
          <div class="title">Field Situation</div>
          <div class="fieldWrap">
            <div class="diamond">
              <div class="base second" id="base2"></div>
              <div class="base third" id="base3"></div>
              <div class="base first" id="base1"></div>
              <div class="base home"></div>
              <div class="diamond-label l1">1B</div>
              <div class="diamond-label l2">2B</div>
              <div class="diamond-label l3">3B</div>
            <div class="diamond-label lh">HOME</div>
          </div>
          <div class="row"><span>攻撃チーム</span><strong id="offenseTeam">-</strong></div>
          <div class="row" style="align-items: start;"><span>打者</span><div style="text-align: right;"><strong id="batterName">-</strong><div id="batterStats" style="font-size: 10px; color: var(--muted); margin-top: 2px;"></div></div></div>
          <div class="row" style="align-items: start;"><span>投手</span><div style="text-align: right;"><strong id="pitcherName">-</strong><div id="pitcherStats" style="font-size: 10px; color: var(--muted); margin-top: 2px;"></div></div></div>
          <div class="row"><span>カウント</span><strong id="countText">-</strong></div>
          <div class="mini-grid">
            <div class="smallbox">
                <div class="player-name">守備力影響</div>
                <div class="tiny" id="defenseHint">-</div>
              </div>
              <div class="smallbox">
                <div class="player-name">投手スタミナ</div>
                <div class="tiny" id="pitcherStaminaHint">-</div>
              </div>
            </div>
            <div class="inning-board" id="inningBoard"></div>
          </div>
        </section>
      </div>

      <div class="game-layout">
        <section class="panel">
          <div class="title">実況ログ</div>
          <div class="log" id="logBox"></div>
        </section>
        <section class="panel">
          <div class="title">成績 / ベンチ</div>
          <div class="bench-list" id="benchBox"></div>
        </section>
      </div>
    </main>
  </div>

  <script>
  (() => {
    // ---- AUDIO SYSTEM (Web Audio API Synthesizer) ----
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioContext();
    let isAudioInitialized = false;

    function initAudio() {
      if(!isAudioInitialized && audioCtx.state === 'suspended') {
        audioCtx.resume();
        isAudioInitialized = true;
      }
    }
    document.addEventListener('click', initAudio, { once: true });

    function playSound(type) {
      if(audioCtx.state === 'suspended') return;
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);

      if (type === 'strike') {
        osc.type = 'sine'; osc.frequency.setValueAtTime(800, now); osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
        gain.gain.setValueAtTime(0.3, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
        osc.start(now); osc.stop(now + 0.1);
      } else if (type === 'ball') {
        osc.type = 'sine'; osc.frequency.setValueAtTime(300, now); osc.frequency.exponentialRampToValueAtTime(200, now + 0.15);
        gain.gain.setValueAtTime(0.3, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
        osc.start(now); osc.stop(now + 0.15);
      } else if (type === 'hit') {
        osc.type = 'triangle'; osc.frequency.setValueAtTime(1200, now); osc.frequency.exponentialRampToValueAtTime(300, now + 0.1);
        gain.gain.setValueAtTime(0.5, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
        osc.start(now); osc.stop(now + 0.1);
      } else if (type === 'out') {
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, now); osc.frequency.exponentialRampToValueAtTime(50, now + 0.3);
        gain.gain.setValueAtTime(0.3, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
        osc.start(now); osc.stop(now + 0.3);
      } else if (type === 'cheer') {
        const bufferSize = audioCtx.sampleRate * 1.5;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
        const noise = audioCtx.createBufferSource(); noise.buffer = buffer;
        const filter = audioCtx.createBiquadFilter(); filter.type = 'bandpass'; filter.frequency.value = 800;
        noise.connect(filter); filter.connect(gain);
        gain.gain.setValueAtTime(0, now); gain.gain.linearRampToValueAtTime(0.15, now + 0.3); gain.gain.linearRampToValueAtTime(0, now + 1.5);
        noise.start(now); noise.stop(now + 1.5);
      }
    }

    function playMelody(notes, speed = 1.0) {
      if(audioCtx.state === 'suspended') return;
      let time = audioCtx.currentTime;
      notes.forEach(([freq, duration, type = 'square']) => {
        if(freq > 0) {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.type = type;
          osc.frequency.value = freq;
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          gain.gain.setValueAtTime(0.1, time);
          gain.gain.exponentialRampToValueAtTime(0.001, time + (duration * speed) - 0.05);
          osc.start(time);
          osc.stop(time + (duration * speed));
        }
        time += (duration * speed);
      });
    }

    const JINGLES = {
      playball: [[523.25, 0.2], [659.25, 0.2], [783.99, 0.2], [1046.50, 0.6]],
      halftime: [[392.00, 0.2], [523.25, 0.2], [659.25, 0.2], [523.25, 0.2], [659.25, 0.4]],
      hero: [[1046.50, 0.15], [1318.51, 0.15], [1567.98, 0.3], [1318.51, 0.15], [2093.00, 0.6]],
      ending: [
        [523.25, 0.4], [587.33, 0.4], [659.25, 0.8], [523.25, 0.4], [659.25, 0.4], [783.99, 0.8],
        [880.00, 0.4], [783.99, 0.4], [659.25, 0.8], [587.33, 1.2]
      ]
    };

    // ---- GAME LOGIC ----
    const LEAGUE_TEAMS = ['TOKYO BLUE STARS','OSAKA TIGERS','NAGOYA COMETS','YOKOHAMA WAVES','FUKUOKA PHOENIX','SENDAI NORTHERNS'];
    // 5節で一巡する対戦カードパターン（0は常に自チーム）
    const MATCH_PATTERNS = [
      [[0,1], [2,3], [4,5]],
      [[0,2], [1,4], [3,5]],
      [[0,3], [1,5], [2,4]],
      [[0,4], [1,3], [2,5]],
      [[0,5], [1,2], [3,4]]
    ];

    const $ = id => document.getElementById(id);
    const els = {
      standingsBox:$('standingsBox'), saveSlots:$('saveSlots'), scoreLabel:$('scoreLabel'),
      phasePill:$('phasePill'), modePill:$('modePill'), pitchTypePill:$('pitchTypePill'), inningPill:$('inningPill'),
      homeScore:$('homeScore'), awayScore:$('awayScore'), headlineContainer:$('headlineContainer'),
      headline:$('headline'), eventBadge:$('eventBadge'), narration:$('narration'), tvline:$('tvline'), miniRow:$('miniRow'),
      primaryActions:$('primaryActions'), secondaryActions:$('secondaryActions'),
      base1:$('base1'), base2:$('base2'), base3:$('base3'),
      offenseTeam:$('offenseTeam'), batterName:$('batterName'), batterStats:$('batterStats'), pitcherName:$('pitcherName'), pitcherStats:$('pitcherStats'),
      countText:$('countText'), defenseHint:$('defenseHint'), pitcherStaminaHint:$('pitcherStaminaHint'),
      inningBoard:$('inningBoard'), logBox:$('logBox'), benchBox:$('benchBox'),
      batterChip:$('batterChip'), pitcherChip:$('pitcherChip'), baseChip:$('baseChip'),
      b1:$('b1'), b2:$('b2'), b3:$('b3'), b4:$('b4'), s1:$('s1'), s2:$('s2'), s3:$('s3'), o1:$('o1'), o2:$('o2'), o3:$('o3')
    };

    const randi = (min,max) => Math.floor(Math.random()*(max-min+1))+min;
    const chance = pct => Math.random()*100 < pct;
    const clone = obj => JSON.parse(JSON.stringify(obj));

    function makeBatStats(){ return {ab:0,h:0,d2:0,d3:0,hr:0,rbi:0,bb:0,so:0,sb:0,r:0}; }
    function makePitchStats(){ return {outs:0,er:0,so:0,bb:0,w:0,l:0,sv:0,h:0,hr:0}; }
    function batAvg(s){ return s.ab ? (s.h / s.ab).toFixed(3) : '.000'; }
    function era(s){ return s.outs ? ((s.er * 27) / s.outs).toFixed(2) : '0.00'; }

    function createHomeHitters(){
      return [
        {name:'青山',pos:'CF',contact:72,power:56,speed:78,defense:71,traits:['盗塁王'],stats:makeBatStats()},
        {name:'立石',pos:'2B',contact:68,power:54,speed:66,defense:69,traits:[],stats:makeBatStats()},
        {name:'黒川',pos:'RF',contact:64,power:73,speed:58,defense:60,traits:['強肩'],stats:makeBatStats()},
        {name:'尾崎',pos:'1B',contact:60,power:79,speed:42,defense:57,traits:['ホームランバッター'],stats:makeBatStats()},
        {name:'真鍋',pos:'LF',contact:65,power:61,speed:59,defense:58,traits:[],stats:makeBatStats()},
        {name:'市原',pos:'3B',contact:58,power:67,speed:49,defense:63,traits:[],stats:makeBatStats()},
        {name:'坂東',pos:'SS',contact:63,power:50,speed:71,defense:76,traits:[],stats:makeBatStats()},
        {name:'広瀬',pos:'C',contact:55,power:49,speed:35,defense:74,traits:['強肩'],stats:makeBatStats()},

    function createState(){
      return {
        mode:'title', scheduleIndex:0, seasonLen:12,
        standings: LEAGUE_TEAMS.map(name => ({name,w:0,l:0})), record:{w:0,l:0},
        logs:[{text:'Pennant Manager DX へようこそ。',type:'em'}],
        roster:{ hitters:createHomeHitters(), pitchers:createHomePitchers() },
        game:null
      };
    }

    function buildGame(starterIndex){
      const round = state.scheduleIndex % 5;
      const todaysMatches = MATCH_PATTERNS[round];
      const away = LEAGUE_TEAMS[todaysMatches[0][1]];
      
      const homeLineup = state.roster.hitters.slice(0,9);
      const benchHitters = state.roster.hitters.slice(9);
      const strongArms = homeLineup.filter(h => h.traits.includes('強肩')).length;
      const baseDefense = Math.round(homeLineup.reduce((s,h)=>s+h.defense,0)/homeLineup.length);
      
      const awayPitchers = createAwayPitchers();
      const awayStarterIndex = state.scheduleIndex % 3;
      state.roster.pitchers[starterIndex].restDays = 4;

      // 他球場の試合データ
      const otherMatches = [
        { home: LEAGUE_TEAMS[todaysMatches[1][0]], away: LEAGUE_TEAMS[todaysMatches[1][1]], homeScore: 0, awayScore: 0, inning: 1 },
        { home: LEAGUE_TEAMS[todaysMatches[2][0]], away: LEAGUE_TEAMS[todaysMatches[2][1]], homeScore: 0, awayScore: 0, inning: 1 }
      ];

      return {
        inning:1, half:'top', outs:0, balls:0, strikes:0,
        home:'TOKYO BLUE STARS', away, homeScore:0, awayScore:0, offense:'away',
        bases:[null,null,null], inningRuns:{home:Array(9).fill('-'), away:Array(9).fill('-')},
        batter:null, pitcher:null, pitchMode:'auto', pitchType:'-', selectedPitch:null,
        currentPitcherIndex:starterIndex, currentAwayPitcherIndex:awayStarterIndex, currentHomeBatterIndex:0, currentAwayBatterIndex:0,
        homeLineup, benchHitters, awayLineup:createAwayLineup(), awayPitchers,
        pitcherStamina:state.roster.pitchers[starterIndex].stamina, awayPitcherStamina:awayPitchers[awayStarterIndex].stamina,
        defense: baseDefense + (strongArms * 2),
        isHalftimeDone: false,
        otherMatches
      };
    }

    let state = createState();

    function exportJSON() {
      const dataStr = JSON.stringify({
        time: new Date().toLocaleString('ja-JP'),
        state: clone(state),
        record: clone(state.record)
      });
      const blob = new Blob([dataStr], {type: "application/json"});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `pennant_manager_save_${new Date().getTime()}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      addLog('セーブデータをダウンロードしました。', 'good');
    }

    function importJSON(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const data = JSON.parse(e.target.result);
          if (data && data.state) {
            state = clone(data.state);
            addLog('セーブデータを読み込みました。', 'good');
            restoreView();
          } else {
            addLog('無効なデータ形式です。', 'bad');
          }
        } catch (err) {
          addLog('ファイルの読み込みに失敗しました。', 'bad');
        }
      };
      reader.readAsText(file);
      event.target.value = '';
    }

    function addLog(text,type=''){
      state.logs.unshift({text,type}); state.logs = state.logs.slice(0,300); renderLog();
    }

    function currentHomePitcher(){ return state.roster.pitchers[state.game.currentPitcherIndex]; }
    function currentAwayPitcher(){ return state.game.awayPitchers[state.game.currentAwayPitcherIndex]; }
    function currentDefensivePitcher(){ return state.game.offense === 'away' ? currentHomePitcher() : currentAwayPitcher(); }
    function currentOffenseBatter(){ return state.game.offense === 'away' ? state.game.awayLineup[state.game.currentAwayBatterIndex] : state.game.homeLineup[state.game.currentHomeBatterIndex]; }
    function chooseAutoPitch(){ const list = currentDefensivePitcher().pitches; return list[randi(0,list.length-1)]; }
    function getCurrentPitcherStamina(){ return state.game.offense === 'away' ? state.game.pitcherStamina : state.game.awayPitcherStamina; }

    function usePitcherStamina(amount){
      if(state.game.offense === 'away') state.game.pitcherStamina = Math.max(0, state.game.pitcherStamina - amount);
      else state.game.awayPitcherStamina = Math.max(0, state.game.awayPitcherStamina - amount);
    }

    function setCurrentDisplayedNames(){
      if(!state.game) return;
      state.game.batter = currentOffenseBatter().name;
      state.game.pitcher = currentDefensivePitcher().name;
    }

    function clearCount(){ state.game.balls = 0; state.game.strikes = 0; }
    function markInningIfNeeded(){
      const g = state.game; const idx = g.inning - 1;
      if(g.inningRuns.home[idx] === '-') g.inningRuns.home[idx] = 0;
      if(g.inningRuns.away[idx] === '-') g.inningRuns.away[idx] = 0;
    }

    function addRun(side,runs=1){
      const g = state.game; markInningIfNeeded();
      if(side === 'home'){ g.homeScore += runs; g.inningRuns.home[g.inning-1] = Number(g.inningRuns.home[g.inning-1]) + runs; }
      else{ g.awayScore += runs; g.inningRuns.away[g.inning-1] = Number(g.inningRuns.away[g.inning-1]) + runs; }
    }

    function getBaseText(){
      const g = state.game;
      const tags = [];
      if(g.bases[0]) tags.push('1塁');
      if(g.bases[1]) tags.push('2塁');
      if(g.bases[2]) tags.push('3塁');
      return tags.length ? tags.join(' / ') : '走者なし';
    }

    function forceWalkAdvance(side){
      const g = state.game; const forcedRun = g.bases[0] && g.bases[1] && g.bases[2];
      g.bases[2] = g.bases[2] || g.bases[1] || null; g.bases[1] = g.bases[1] || g.bases[0] || null;
      g.bases[0] = {name:'Runner',speed:50};
      if(forcedRun) addRun(side,1);
      return forcedRun;
    }

    function advanceOnHit(kind, side, batterObj){
      const g = state.game; let runs = 0;
      const first = g.bases[0], second = g.bases[1], third = g.bases[2];

      if(kind === 'single'){
        if(third) runs++;
        g.bases[2] = second ? (chance(72) ? (runs++, null) : second) : null;
        g.bases[1] = first ? first : null; g.bases[0] = batterObj;
      }
      else if(kind === 'double'){
        if(third) runs++; if(second) runs++;
        g.bases[2] = first ? (chance(58) ? (runs++, null) : first) : null;
        g.bases[1] = batterObj; g.bases[0] = null;
      }
      else if(kind === 'triple'){
        if(third) runs++; if(second) runs++; if(first) runs++;
        g.bases[2] = batterObj; g.bases[1] = null; g.bases[0] = null;
      }
      else if(kind === 'hr'){
        if(third) runs++; if(second) runs++; if(first) runs++; runs++;
        g.bases = [null,null,null];
      }
      if(runs > 0) addRun(side,runs);
      return runs;
    }

    function getDoublePlayType(){
      const g = state.game;
      if(!g.bases[0] || g.outs >= 2) return null;
      if(g.bases[0] && g.bases[1] && g.bases[2] && g.outs <= 1 && chance(6)) return 'home';
      if(chance(20)) return 'standard';
      return null;
    }

    function maybeAutoStealForAway(){
      const g = state.game;
      if(g.offense !== 'away') return false;
      const runner = g.bases[0];
      if(runner && !g.bases[1]){
        const isSBKing = state.game.awayLineup[g.currentAwayBatterIndex - 1 < 0 ? 8 : g.currentAwayBatterIndex - 1]?.traits.includes('盗塁王');
        if(chance(isSBKing ? 35 : 15)){
          g.bases[1] = g.bases[0]; g.bases[0] = null;
          addLog('相手走者が自動盗塁。二塁成功。','bad'); playSound('strike');
          return true;
        }
      }
      return false;
    }

    function creditPitchingOuts(n){ currentHomePitcher().stats.outs += n; }
    function creditPitchWalk(){ currentHomePitcher().stats.bb += 1; }
    function creditPitchStrikeout(){ currentHomePitcher().stats.so += 1; }
    function creditPitchHit(kind){ currentHomePitcher().stats.h += 1; if(kind === 'hr') currentHomePitcher().stats.hr += 1; }
    function creditPitchRuns(runs){ currentHomePitcher().stats.er += runs; }

    function advanceAwayBatter(){ state.game.currentAwayBatterIndex = (state.game.currentAwayBatterIndex + 1) % state.game.awayLineup.length; setCurrentDisplayedNames(); }
    function advanceHomeBatter(){ state.game.currentHomeBatterIndex = (state.game.currentHomeBatterIndex + 1) % state.game.homeLineup.length; setCurrentDisplayedNames(); }

    function checkWalkOff(){
      const g = state.game;
      if(g && g.inning >= 9 && g.half === 'bottom' && g.homeScore > g.awayScore){
        addLog('サヨナラ勝ち！','good');
        return true;
      }
      return false;
    }

    // 他球場のイニング進行・得点処理
    function updateOtherMatches(half){
      const g = state.game;
      if(!g || !g.otherMatches) return;
      g.otherMatches.forEach(m => {
        if(m.inning > 9) return;
        if(chance(22)){
          const runs = randi(1,3);
          if(half === 'top') m.awayScore += runs;
          else m.homeScore += runs;
        }
      });
    }

    function nextHalf(){
      const g = state.game; markInningIfNeeded();

      if(g.half === 'top'){
        updateOtherMatches('top');

        if(g.inning >= 9 && g.homeScore > g.awayScore) {
          finishGame();
          return;
        }

        g.half = 'bottom'; g.offense = 'home'; g.outs = 0; clearCount(); g.bases = [null,null,null]; g.pitchType = '-'; g.selectedPitch = null;
        setCurrentDisplayedNames();
        setNarration('攻撃采配',`こちらの攻撃です。${g.batter} が打席へ。`);
        showOffenseActions();
      } else {
        updateOtherMatches('bottom');

        // 他球場の途中経過速報
        if(g.inning === 3 || g.inning === 6) {
          let msg = `【他球場速報 ${g.inning}回終了】\n`;
          g.otherMatches.forEach(m => {
            msg += `${m.home} ${m.homeScore} - ${m.awayScore} ${m.away} | `;
          });
          addLog(msg, 'special');
        }

        if(g.inning >= 9 && g.homeScore !== g.awayScore) { finishGame(); return; }
        
        if(g.inning === 5 && !g.isHalftimeDone) {
          g.isHalftimeDone = true;
          showHalftimeEvent();
          return;
        }

        g.otherMatches.forEach(m => m.inning++);
        g.inning++; g.half = 'top'; g.offense = 'away'; g.outs = 0; clearCount(); g.bases = [null,null,null]; g.pitchType = '-'; g.selectedPitch = null;
        setCurrentDisplayedNames();
        setNarration('守備采配',`相手打者は ${g.batter}。`);
        showDefenseActions();
      }
      renderAll();
    }

    // ---- RENDERING ----
    function renderStandings(){
      els.standingsBox.innerHTML = '';
      [...state.standings].sort((a,b)=>b.w-a.w || a.l-b.l).forEach((t,i)=>{
        const row = document.createElement('div'); row.className = 'row';
        row.innerHTML = `<span>${i+1}. ${t.name}</span><strong>${t.w}-${t.l}</strong>`;
        els.standingsBox.appendChild(row);
      });
    }

    function renderSaveLoadUI(){
      const container = els.saveSlots;
      container.innerHTML = '';
      
      const btnSave = document.createElement('button');
      btnSave.className = 'green';
      btnSave.textContent = 'JSONをダウンロード (SAVE)';
      btnSave.style.width = '100%';
      btnSave.onclick = exportJSON;

      const fileInput = document.createElement('input');
      fileInput.type = 'file';
      fileInput.accept = '.json';
      fileInput.style.display = 'none';
      fileInput.onchange = importJSON;

      const btnLoad = document.createElement('button');
      btnLoad.className = 'secondary';
      btnLoad.textContent = 'JSONを読み込む (LOAD)';
      btnLoad.style.width = '100%';
      btnLoad.onclick = () => fileInput.click();

      container.append(btnSave, fileInput, btnLoad);
    }

    function getTraitsHtml(traits) {
      if(!traits || traits.length === 0) return '';
      return traits.map(t => `<span class="trait-tag">${t}</span>`).join(' ');
    }

    function renderBoard(){
      const g = state.game;
      els.scoreLabel.textContent = g ? `${g.home} vs ${g.away}` : 'TOKYO BLUE STARS 監督室';
      els.phasePill.textContent = state.mode.toUpperCase();
      els.modePill.textContent = g ? (g.pitchMode === 'auto' ? 'AUTO' : 'MANUAL') : 'AUTO';
      els.pitchTypePill.textContent = g ? (g.pitchType || '-') : '-';
      els.inningPill.textContent = g ? `${g.inning}回${g.half === 'top' ? '表' : '裏'}` : '-';
      els.homeScore.textContent = g ? g.homeScore : '0'; els.awayScore.textContent = g ? g.awayScore : '0';
      
      const isEvent = ['ceremony', 'halftime', 'hero', 'ending', 'select_starter'].includes(state.mode);
      els.tvline.style.display = isEvent ? 'none' : 'flex';
      els.miniRow.style.display = isEvent ? 'none' : 'flex';
      els.eventBadge.style.display = isEvent ? 'inline-block' : 'none';
      if(isEvent) els.narration.className = 'narration event-narration';
      else els.narration.className = 'narration';

      if(g && !isEvent){
        els.offenseTeam.textContent = g.offense === 'home' ? g.home : g.away;
        
        const bObj = currentOffenseBatter(); const pObj = currentDefensivePitcher();
        
        els.batterName.textContent = g.batter;
        els.batterStats.textContent = bObj.stats ? `AVG ${batAvg(bObj.stats)} / HR ${bObj.stats.hr} / RBI ${bObj.stats.rbi}` : '';
        els.pitcherName.textContent = g.pitcher;
        els.pitcherStats.textContent = pObj.stats ? `ERA ${era(pObj.stats)} / W ${pObj.stats.w} / SO ${pObj.stats.so}` : '';

        els.countText.textContent = `${g.balls}-${g.strikes} / ${g.outs}アウト`;
        els.defenseHint.textContent = `守備力 ${g.defense}`;
        els.pitcherStaminaHint.textContent = `${getCurrentPitcherStamina()}%`;
        
        els.batterChip.textContent = `打者 ${g.batter}`; 
        els.batterChip.className = bObj.traits.length > 0 ? 'chip trait-chip' : 'chip';
        els.pitcherChip.textContent = `投手 ${g.pitcher}`;
        els.pitcherChip.className = pObj.traits.length > 0 ? 'chip trait-chip' : 'chip';
        els.baseChip.textContent = getBaseText();
      }

      [els.b1,els.b2,els.b3,els.b4].forEach((el,i)=>el.classList.toggle('on', g && i < g.balls));
      [els.s1,els.s2,els.s3].forEach((el,i)=>el.classList.toggle('on', g && i < g.strikes));
      [els.o1,els.o2,els.o3].forEach((el,i)=>el.classList.toggle('on', g && i < g.outs));
      
      const b = g ? g.bases : [null,null,null];
      els.base1.classList.toggle('active', !!b[0]); els.base2.classList.toggle('active', !!b[1]); els.base3.classList.toggle('active', !!b[2]);

      els.inningBoard.innerHTML = '';
      for(let i=0;i<9;i++){
        const cell = document.createElement('div'); cell.className = 'inning-cell';
        cell.innerHTML = `<div>${i+1}</div><div class="tiny">${g ? g.inningRuns.away[i] : '-'}/${g ? g.inningRuns.home[i] : '-'}</div>`;
        els.inningBoard.appendChild(cell);
      }
    }

    function renderLog(){
      els.logBox.innerHTML = '';
      state.logs.forEach(l=>{
        const d = document.createElement('div'); d.className = `log-line ${l.type}`.trim(); d.textContent = l.text;
        els.logBox.appendChild(d);
      });
    }

    function renderBench(){
      els.benchBox.innerHTML = '';
      if(!state.game){ els.benchBox.innerHTML = '<div class="tiny">試合が始まると成績が表示されます。</div>'; return; }
      
      const bt = document.createElement('div'); bt.className = 'player-card'; bt.innerHTML = '<div class="player-name">野手成績</div>'; els.benchBox.appendChild(bt);
      state.game.homeLineup.forEach((h,i)=>{
        const s = h.stats; const d = document.createElement('div'); d.className = 'player-card';
        d.innerHTML = `<div class="player-name"><span>${i+1}. ${h.name} ${h.pos}</span> ${getTraitsHtml(h.traits)}</div><div class="tiny">AVG ${batAvg(s)} / HR ${s.hr} / RBI ${s.rbi}</div>`;
        els.benchBox.appendChild(d);
      });

      if(state.game.benchHitters && state.game.benchHitters.length > 0){
        state.game.benchHitters.forEach((h)=>{
          const s = h.stats; const d = document.createElement('div'); d.className = 'player-card'; d.style.opacity = '0.7';
          d.innerHTML = `<div class="player-name"><span>控. ${h.name} ${h.pos}</span> ${getTraitsHtml(h.traits)}</div><div class="tiny">AVG ${batAvg(s)} / HR ${s.hr} / RBI ${s.rbi}</div>`;
          els.benchBox.appendChild(d);
        });
      }

      const pt = document.createElement('div'); pt.className = 'player-card'; pt.innerHTML = '<div class="player-name">投手成績</div>'; els.benchBox.appendChild(pt);
      state.roster.pitchers.forEach((p,i)=>{
        const s = p.stats; const d = document.createElement('div'); d.className = 'player-card';
        const current = (state.mode !== 'select_starter' && state.game && i === state.game.currentPitcherIndex) ? ' ← 登板中' : '';
        const restText = p.restDays > 0 ? ` (休養残り${p.restDays}日)` : '';
        d.innerHTML = `<div class="player-name"><span>${p.name} ${p.role}${current}</span> ${getTraitsHtml(p.traits)}</div><div class="tiny">ERA ${era(s)} / W ${s.w} / SO ${s.so}${restText}</div>`;
        els.benchBox.appendChild(d);
      });
    }

    function setNarration(head,text){ els.headline.textContent = head; els.narration.innerHTML = text; }
    function setActions(primary=[],secondary=[]){
      els.primaryActions.innerHTML = ''; els.secondaryActions.innerHTML = '';
      primary.forEach(a=>{ const b = document.createElement('button'); b.textContent = a.label; b.className = a.className || ''; b.onclick = a.onClick; b.disabled = !!a.disabled; els.primaryActions.appendChild(b); });

    // ---- SCENES / EVENTS ----
    function showTitle(){
      state.mode = 'title'; state.game = null;
      setNarration('監督室','青いユニフォームが並ぶロッカールーム。今日から、あなたがこのチームの監督です。選手を選び、サインを出し、ペナントレースを勝ち抜いて日本一を目指してください。');
      setActions([{label:'新シーズン開始',className:'gold',onClick:startSeason}], [{label:'ロード案内',onClick:()=>addLog('左の SAVE / LOAD から読込できます。')}]);
      renderAll();
    }

    function startSeason(){
      state.scheduleIndex = 0; state.record = {w:0,l:0}; state.standings = LEAGUE_TEAMS.map(name => ({name,w:0,l:0}));
      state.logs = [{text:'新しいシーズンが始まった。',type:'em'}];
      state.roster = { hitters:createHomeHitters(), pitchers:createHomePitchers() };
      prepareNextGame();
    }

    function prepareNextGame(){
      state.mode = 'select_starter';
      const round = state.scheduleIndex % 5;
      const awayTeam = LEAGUE_TEAMS[MATCH_PATTERNS[round][0][1]];
      setNarration('先発投手選択',`第${state.scheduleIndex+1}戦。相手は ${awayTeam}。\n本日の先発投手を選んでください。\n（先発登板後は中3日の休養が必要です）`);
      
      const primaryActions = state.roster.pitchers.map((p, i) => {
        const isResting = p.restDays > 0;
        return {
          label: `${p.name} ${p.role} ${isResting ? `(休${p.restDays}日)` : ''}`,
          className: isResting ? 'secondary' : 'gold',
          disabled: isResting,
          onClick: () => startGameWithStarter(i)
        };
      });

      setActions(primaryActions, [{label:'保存(JSON)',className:'green',onClick:exportJSON}]);
      if(!state.game) state.game = { homeLineup:state.roster.hitters.slice(0,9), benchHitters:state.roster.hitters.slice(9) };
      renderAll();
    }

    function startGameWithStarter(starterIndex){
      state.game = buildGame(starterIndex); 
      setCurrentDisplayedNames(); 
      state.mode = 'ceremony';
      setNarration('始球式 (First Pitch)','地元のアイドルによる始球式が行われます。<br>スタジアムは大歓声に包まれています！');
      playSound('cheer');
      setActions([{label:'プレイボール！',className:'gold',onClick:startGame}], [{label:'保存(JSON)',className:'green',onClick:exportJSON}]);
      renderAll();
    }

    function startGame(){
      state.mode = 'manager'; state.game.offense = 'away'; setCurrentDisplayedNames();
      playMelody(JINGLES.playball);
      addLog('プレイボール！','special');
      setNarration('守備采配',`試合開始！ 相手打者は ${state.game.batter}。`);
      showDefenseActions(); renderAll();
    }

    function showHalftimeEvent(){
      state.mode = 'halftime';
      playMelody(JINGLES.halftime);
      setNarration('ハーフタイムショー','5回裏終了。<br>グラウンドではチアリーダーたちの華やかなパフォーマンスが行われています。');
      setActions([{label:'試合に戻る',className:'gold',onClick:()=>{
        state.game.inning++; state.game.half = 'top'; state.game.offense = 'away'; state.game.outs = 0; clearCount(); state.game.bases = [null,null,null];
        state.mode = 'manager'; setCurrentDisplayedNames();
        setNarration('守備采配',`6回表。相手打者は ${state.game.batter}。`);
        showDefenseActions(); renderAll();
      }}],[]);
      renderAll();
    }

    function showHeroInterview(otherResultsText = ''){
      state.mode = 'hero';
      playMelody(JINGLES.hero);
      let mvp = state.roster.pitchers[0].name;
      const bestHitter = [...state.game.homeLineup].sort((a,b)=>b.stats.rbi - a.stats.rbi)[0];
      if(bestHitter && bestHitter.stats.rbi > 0) mvp = bestHitter.name;

      setNarration('ヒーローインタビュー',`今日のヒーローは ${mvp} 選手です！<br>「熱いご声援ありがとうございます！」<br><br>${otherResultsText}`);
      setActions([{label:'次の試合へ',className:'gold',onClick:nextGame}],[]);
      renderAll();
    }

    function showEnding(){
      state.mode = 'ending';
      playMelody(JINGLES.ending, 1.2);
      
      const html = `
        <div class="credits-container">
          <div class="credits-scroll">
            <h2>PENNANT MANAGER DX</h2>
            <p>FINAL RECORD: ${state.record.w}W - ${state.record.l}L</p>
            <br><p>-- BLUE STARS ROSTER --</p>
            ${state.roster.hitters.map(h=>`<p>${h.name} (${h.pos})</p>`).join('')}
            ${state.roster.pitchers.map(p=>`<p>${p.name} (${p.role})</p>`).join('')}
            <br><p>Thank you for playing!</p>
          </div>
        </div>
      `;
      setNarration('SEASON END', html);
      setActions([{label:'タイトルへ戻る',className:'gold',onClick:showTitle}],[]);
      renderAll();
    }

    function showDefenseActions(){
      setActions(
        [{label:'勝負',className:'gold',onClick:()=>resolvePitch('attack')}, {label:'一球外す',className:'orange',onClick:()=>resolvePitch('waste')},
         {label:'申告敬遠',className:'purple',onClick:()=>resolvePitch('ibb')}, {label:'牽制',className:'secondary',onClick:()=>resolvePitch('pickoff')}],
        [{label:'AUTO/指定切替',onClick:toggleMode}, {label:'球種指定',className:'purple',onClick:pickPitch,disabled:state.game.pitchMode!=='manual'},
         {label:'継投',onClick:changePitcherMenu}, {label:'保存(JSON)',className:'green',onClick:exportJSON}]
      );
    }

    function showOffenseActions(){
      setActions(
        [{label:'打たせる',className:'gold',onClick:()=>resolveBat('normal')}, {label:'強振',className:'orange',onClick:()=>resolveBat('power')},
         {label:'バント',className:'secondary',onClick:()=>resolveBat('bunt')}, {label:'一球見送り',className:'secondary',onClick:()=>resolveBat('take')}],
        [{label:'代打',onClick:showPinchHitterMenu}, {label:'盗塁',className:'purple',onClick:stealAttempt}, {label:'次打者へ',onClick:forceAdvanceBatter}, {label:'保存(JSON)',className:'green',onClick:exportJSON}]
      );
    }

    function showPinchHitterMenu(){
      const bench = state.game.benchHitters;
      if(!bench || bench.length === 0){
        addLog('ベンチに代打がいません。','bad');
        renderAll();
        return;
      }
      setNarration('代打','起用する代打を選んでください。');
      setActions(
        bench.map((p, i) => ({
          label:`${p.name} ${p.pos}`, className:'gold',
          onClick:()=>executePinchHitter(i)
        })),
        [{label:'戻る', onClick:()=>{
          setNarration('攻撃采配',`こちらの攻撃です。${state.game.batter} が打席へ。`);
          showOffenseActions(); renderAll();
        }}]
      );
      renderAll();
    }

    function executePinchHitter(index){
      const g = state.game;
      const newBatter = g.benchHitters[index];
      const oldBatterName = g.homeLineup[g.currentHomeBatterIndex].name;
      
      g.homeLineup[g.currentHomeBatterIndex] = newBatter;
      g.benchHitters.splice(index, 1);
      
      setCurrentDisplayedNames();
      playSound('cheer');
      addLog(`${oldBatterName} に代わって、代打 ${newBatter.name} ！`, 'special');
      setNarration('攻撃采配', `代打 ${newBatter.name} が打席へ。`);
      
      showOffenseActions();
      renderAll();
    }

    function toggleMode(){ state.game.pitchMode = state.game.pitchMode === 'auto' ? 'manual' : 'auto'; state.game.pitchType = '-'; showDefenseActions(); renderAll(); }
    
    function pickPitch(){
      setNarration('球種指定','次の一球を指定してください。');
      setActions(currentPitchList().map(p=>({label:p,className:'purple',onClick:()=>{ state.game.pitchType=p; state.game.selectedPitch=p; setNarration('守備采配',`相手打者は ${state.game.batter}。\n次球は ${p} です。`); showDefenseActions(); renderAll(); }})),
        [{label:'戻る',onClick:()=>{ setNarration('守備采配',`相手打者は ${state.game.batter}。`); showDefenseActions(); renderAll(); }}]);
    }

    function changePitcherMenu(){
      setNarration('継投','投入する投手を選んでください。');
      setActions(state.roster.pitchers.map((p,i)=>{
        const isResting = p.restDays > 0 && i !== state.game.currentPitcherIndex;
        const isActive = i === state.game.currentPitcherIndex;
        return {
          label:`${p.name} ${p.role}${p.restDays > 0 ? ` (休${p.restDays})` : ''}`, 
          className:(isActive || isResting) ? 'secondary' : 'gold', 
          disabled:isActive || isResting,
          onClick:()=>{ 
            state.game.currentPitcherIndex=i; 
            state.game.pitcher=p.name; 
            state.game.pitcherStamina=p.stamina; 
            p.restDays = Math.max(p.restDays, 1);
            playSound('cheer'); 
            addLog(`${p.name} がマウンドへ。`,'special');
            setNarration('守備采配',`投手は ${p.name} に代わりました。`); showDefenseActions(); renderAll(); 
          }
        };
      }), [{label:'戻る',onClick:()=>{ setNarration('守備采配',`相手打者は ${state.game.batter}。`); showDefenseActions(); renderAll(); }}]);
    }

    function resolvePitch(type){
      const g = state.game; const batter = g.awayLineup[g.currentAwayBatterIndex]; const pitcher = currentHomePitcher(); setCurrentDisplayedNames();

      if(type === 'pickoff'){
        g.pitchType = '牽制';
        if(g.bases[0] && chance(14 + Math.max(0, pitcher.control - 60)/2)){
          g.bases[0] = null; g.outs++; creditPitchingOuts(1); playSound('out'); addLog('一塁へ牽制。アウト。','good');
        } else { playSound('ball'); addLog('一塁へ牽制。セーフ。','em'); }
        if(checkWalkOff()) { finishGame(); return; }
        if(g.outs >= 3) nextHalf(); else { setNarration('守備采配',`相手打者は ${g.batter}。`); showDefenseActions(); } renderAll(); return;
      }

      if(type === 'ibb'){
        clearCount(); g.pitchType = '申告敬遠'; const forcedRun = forceWalkAdvance('away'); creditPitchWalk(); playSound('ball');
        if(forcedRun){ creditPitchRuns(1); addLog('申告敬遠。押し出し。','bad'); } else { addLog('申告敬遠で歩かせた。','special'); }
        advanceAwayBatter(); 
        if(checkWalkOff()) { finishGame(); return; }
        setNarration('守備采配',`相手打者は ${g.batter}。`); showDefenseActions(); renderAll(); return;
      }

      if(type === 'waste'){
        g.pitchType = '外し球'; usePitcherStamina(2); maybeAutoStealForAway();
        const wasteRoll = randi(1, 100);
        if(wasteRoll <= 70){ g.balls = Math.min(4, g.balls + 1); playSound('ball'); addLog('大きく外した。ボール。','em'); }
        else if(wasteRoll <= 80){ if(g.strikes < 2) g.strikes++; playSound('strike'); addLog('ボール球に手を出してファウル。','em'); }
        else if(wasteRoll <= 90){
          g.strikes = Math.min(3, g.strikes + 1);
          if(g.strikes >= 3){ g.outs++; creditPitchStrikeout(); creditPitchingOuts(1); clearCount(); playSound('out'); addLog('振らせて三振！','good'); advanceAwayBatter(); }
          else { playSound('strike'); addLog('振らせて空振り。','good'); }
        } else {
          playSound('hit'); setTimeout(() => playSound('out'), 400); const dpType = getDoublePlayType();
          if(dpType){ g.outs+=2; creditPitchingOuts(2); clearCount(); g.bases[2]=g.bases[1]; g.bases[1]=g.bases[0]; g.bases[0]=null; addLog('ボール球を打たせて併殺！','good'); }
          else { g.outs++; creditPitchingOuts(1); clearCount(); addLog('ボール球を打たせてアウト。','good'); }
          advanceAwayBatter();
        }
        if(g.balls >= 4){ const forcedRun = forceWalkAdvance('away'); clearCount(); creditPitchWalk(); addLog(forcedRun?'四球押し出し。':'四球。','bad'); advanceAwayBatter(); }
        
        if(checkWalkOff()) { finishGame(); return; }
        if(g.outs >= 3) nextHalf(); else { setNarration('守備采配',`相手打者は ${g.batter}。`); showDefenseActions(); } renderAll(); return;
      }

      g.pitchType = (g.pitchMode === 'manual' && g.selectedPitch) ? g.selectedPitch : chooseAutoPitch(); usePitcherStamina(4);
      
      let stuff = pitcher.stuff + Math.floor(g.pitcherStamina / 8);
      let control = pitcher.control + Math.floor(g.pitcherStamina / 10);
      
      if(pitcher.traits.includes('エース') && g.inning <= 3) { stuff += 10; control += 10; }
      if(pitcher.traits.includes('クローザー') && g.inning >= 9 && g.homeScore > g.awayScore) { stuff += 15; control += 15; }

      let batterPower = batter.power;
      let batterContact = batter.contact;
      if(batter.traits.includes('ホームランバッター')) { batterPower += 15; batterContact -= 5; }
      if(batter.traits.includes('代打の切り札') && g.inning >= 7) { batterPower += 15; batterContact += 15; }

      const batterSkill = batterContact + batterPower * 0.4;
      maybeAutoStealForAway();
      const roll = randi(1,100) + Math.floor((batterSkill - stuff) / 2);

      if(roll <= 25 + Math.floor(control / 10)){
        g.strikes = Math.min(3, g.strikes + 1); playSound('strike'); addLog(`${g.pitchType}でストライク。`,'em');
      } else if(roll <= 45 - Math.floor(control / 10)){
        g.balls = Math.min(4, g.balls + 1); playSound('ball'); addLog(`${g.pitchType}はボール。`,'em');
      } else {
        const inplayRoll = randi(1,100) + Math.floor((batterPower - stuff) / 2) - Math.floor(g.defense / 4);

        if(inplayRoll <= 68){
          const dpType = getDoublePlayType(); playSound('hit'); setTimeout(()=>playSound('out'), 300);
          if(dpType){ g.outs+=2; creditPitchingOuts(2); clearCount(); g.bases[2]=g.bases[1]; g.bases[1]=g.bases[0]; g.bases[0]=null; addLog('ゲッツー！','good'); }
          else { g.outs++; creditPitchingOuts(1); clearCount(); addLog('打たせてアウト。','good'); }
          advanceAwayBatter();
        }
        else if(inplayRoll <= 86){ clearCount(); creditPitchRuns(advanceOnHit('single','away',batter)); creditPitchHit('single'); playSound('hit'); addLog('ヒット。','bad'); advanceAwayBatter(); }
        else if(inplayRoll <= 94){ clearCount(); creditPitchRuns(advanceOnHit('double','away',batter)); creditPitchHit('double'); playSound('hit'); addLog('二塁打。','bad'); advanceAwayBatter(); }
        else if(inplayRoll <= 96){ clearCount(); creditPitchRuns(advanceOnHit('triple','away',batter)); creditPitchHit('triple'); playSound('hit'); addLog('三塁打。','bad'); advanceAwayBatter(); }
        else { clearCount(); creditPitchRuns(advanceOnHit('hr','away',batter)); creditPitchHit('hr'); playSound('hit'); setTimeout(()=>playSound('cheer'), 200); addLog('ホームラン。','bad'); advanceAwayBatter(); }
      }

      if(g.strikes >= 3){ g.outs++; creditPitchStrikeout(); creditPitchingOuts(1); clearCount(); playSound('out'); addLog('三振！','good'); advanceAwayBatter(); }
      if(g.balls >= 4){ const f = forceWalkAdvance('away'); clearCount(); creditPitchWalk(); addLog(f?'四球押し出し。':'四球。','bad'); advanceAwayBatter(); }
      
      if(checkWalkOff()) { finishGame(); return; }
      if(g.outs >= 3) nextHalf(); else { setNarration('守備采配',`相手打者は ${g.batter}。`); showDefenseActions(); } renderAll();
    }

    function resolveBat(type){
      const g = state.game; const batter = g.homeLineup[g.currentHomeBatterIndex]; const pitcher = currentAwayPitcher(); setCurrentDisplayedNames();
      g.pitchType = pitcher.pitches[randi(0,pitcher.pitches.length-1)];
      let pitchDifficulty = pitcher.stuff + Math.floor(g.awayPitcherStamina / 8);
      let pitcherControl = pitcher.control + Math.floor(g.awayPitcherStamina / 10);
      g.awayPitcherStamina = Math.max(0, g.awayPitcherStamina - 3);

      if(pitcher.traits.includes('エース') && g.inning <= 3) { pitchDifficulty += 10; pitcherControl += 10; }
      if(pitcher.traits.includes('クローザー') && g.inning >= 9 && g.awayScore > g.homeScore) { pitchDifficulty += 15; pitcherControl += 15; }

      let batterContact = batter.contact + (type === 'power' ? -10 : 10);
      let batterPower = batter.power + (type === 'power' ? 25 : 0);

      if(batter.traits.includes('ホームランバッター')) { batterPower += 15; batterContact -= 5; }
      if(batter.traits.includes('代打の切り札') && g.inning >= 7) { batterPower += 20; batterContact += 15; }

      if(type === 'take'){
        if(randi(1,100) + Math.floor((pitcherControl - batterContact) / 8) <= 45){ g.balls = Math.min(4, g.balls + 1); playSound('ball'); addLog('見送ってボール。','good'); }
        else { g.strikes = Math.min(3, g.strikes + 1); playSound('strike'); addLog('見送ってストライク。','bad'); }
      }
      else if(type === 'bunt'){
        if(randi(1,100) + Math.floor((pitchDifficulty - batterContact) / 8) <= 65){
          clearCount(); g.outs++; if(g.bases[2]){ addRun('home',1); g.bases[2]=null; } if(g.bases[1]){ g.bases[2]=g.bases[1]; g.bases[1]=null; } if(g.bases[0]){ g.bases[1]=g.bases[0]; g.bases[0]=null; }
          batter.stats.ab += 1; playSound('hit'); addLog('送りバント成功。','em'); advanceHomeBatter();
        } else { clearCount(); g.outs++; batter.stats.ab += 1; playSound('out'); addLog('バント失敗。','bad'); advanceHomeBatter(); }
      }
      else {
        const contactRoll = randi(1,100) + Math.floor((batterContact - pitchDifficulty) / 2);
        if(contactRoll <= 25 + Math.floor(pitcherControl / 10)){ g.strikes = Math.min(3, g.strikes + 1); playSound('strike'); addLog('空振り／見逃しストライク。','bad'); }
        else if(contactRoll <= 45 - Math.floor(pitcherControl / 10)){ g.balls = Math.min(4, g.balls + 1); playSound('ball'); addLog('ボール。','em'); }
        else {
          const inplayRoll = randi(1,100) + Math.floor((batterPower - pitchDifficulty) / 2);
          if(inplayRoll <= 68){
            batter.stats.ab += 1; const dpType = getDoublePlayType(); playSound('hit'); setTimeout(()=>playSound('out'), 300);
            if(dpType){ g.outs+=2; clearCount(); g.bases[2]=g.bases[1]; g.bases[1]=g.bases[0]; g.bases[0]=null; addLog('ゲッツー。','bad'); }
            else { g.outs++; clearCount(); addLog('凡退。','bad'); }
            advanceHomeBatter();
          }
          else if(inplayRoll <= 86){ batter.stats.ab++; batter.stats.h++; clearCount(); batter.stats.rbi += advanceOnHit('single','home',batter); playSound('hit'); addLog('ヒット！','good'); advanceHomeBatter(); }
          else if(inplayRoll <= 94){ batter.stats.ab++; batter.stats.h++; batter.stats.d2++; clearCount(); batter.stats.rbi += advanceOnHit('double','home',batter); playSound('hit'); addLog('二塁打！','good'); advanceHomeBatter(); }
          else if(inplayRoll <= 96){ batter.stats.ab++; batter.stats.h++; batter.stats.d3++; clearCount(); batter.stats.rbi += advanceOnHit('triple','home',batter); playSound('hit'); addLog('三塁打！','good'); advanceHomeBatter(); }
          else { batter.stats.ab++; batter.stats.h++; batter.stats.hr++; clearCount(); batter.stats.rbi += advanceOnHit('hr','home',batter); playSound('hit'); setTimeout(()=>playSound('cheer'), 200); addLog('ホームラン！','good'); advanceHomeBatter(); }
        }
      }

      if(g.strikes >= 3){ batter.stats.ab++; batter.stats.so++; g.outs++; clearCount(); playSound('out'); addLog('三振。','bad'); advanceHomeBatter(); }
      if(g.balls >= 4){ const f = forceWalkAdvance('home'); batter.stats.bb++; clearCount(); if(f){ batter.stats.rbi++; playSound('cheer'); addLog('四球押し出し。','good');}else{ addLog('四球。','good');} advanceHomeBatter(); }
      
      if(checkWalkOff()) { finishGame(); return; }
      if(g.outs >= 3) nextHalf(); else { setNarration('攻撃采配',`こちらの攻撃です。${g.batter} が打席へ。`); showOffenseActions(); } renderAll();
    }

    function stealAttempt(){
      const g = state.game; if(!g.bases[0] || g.bases[1]){ addLog('盗塁不可。','bad'); return; }
      const runner = g.bases[0]; const isSBKing = runner.traits && runner.traits.includes('盗塁王');
      const baseSpeed = runner && runner.speed ? runner.speed : 55;
      const success = chance(isSBKing ? 75 : (35 + Math.floor(baseSpeed / 2) - 20));

      if(success){
        if(runner && runner.stats) runner.stats.sb++; g.bases[1]=g.bases[0]; g.bases[0]=null; playSound('strike'); addLog('盗塁成功！','good');
      } else { g.bases[0]=null; g.outs++; playSound('out'); addLog('盗塁失敗。','bad'); }
      
      if(checkWalkOff()) { finishGame(); return; }
      if(g.outs>=3) nextHalf(); else { setNarration('攻撃采配',`こちらの攻撃です。${g.batter} が打席へ。`); showOffenseActions(); } renderAll();
    }

    function forceAdvanceBatter(){ if(state.game.offense === 'home'){ advanceHomeBatter(); showOffenseActions(); } renderAll(); }

    function finishGame(){
      const g = state.game; const win = g.homeScore >= g.awayScore;
      const my = state.standings.find(t=>t.name==='TOKYO BLUE STARS'); const opp = state.standings.find(t=>t.name===g.away);

      if(win){ state.record.w++; if(my) my.w++; if(opp) opp.l++; currentHomePitcher().stats.w++; addLog(`勝利。`,'good'); }
      else { state.record.l++; if(my) my.l++; if(opp) opp.w++; currentHomePitcher().stats.l++; addLog(`敗北。`,'bad'); }

      // 他球場の試合を最後までシミュレートして結果を確定
      let otherResultsText = '【他球場 最終結果】<br>';
      if(g.otherMatches) {
        g.otherMatches.forEach(m => {
          while(m.inning <= 9) {
            if(chance(22)) m.awayScore += randi(1,2);
            if(chance(22)) m.homeScore += randi(1,2);
            m.inning++;
          }
          if(m.homeScore === m.awayScore) { if(chance(50)) m.homeScore++; else m.awayScore++; }
          
          const hTeam = state.standings.find(t=>t.name === m.home);
          const aTeam = state.standings.find(t=>t.name === m.away);
          if(m.homeScore > m.awayScore) { hTeam.w++; aTeam.l++; } else { hTeam.l++; aTeam.w++; }
          
          otherResultsText += `${m.home} ${m.homeScore} - ${m.awayScore} ${m.away}<br>`;
        });
      }

      if(win) {
        showHeroInterview(otherResultsText);
      } else {
        state.mode = 'postgame'; 
        setNarration('試合終了',`敗北しました。<br><br>${otherResultsText}`); 
        setActions([{label:'次の試合へ',className:'gold',onClick:nextGame}], [{label:'保存(JSON)',className:'green',onClick:exportJSON}]); 
        renderAll();
      }
    }

    function nextGame(){
      state.scheduleIndex++;
      if(state.scheduleIndex >= state.seasonLen){ showEnding(); return; }
      
      state.roster.pitchers.forEach(p => {
        if(p.restDays > 0) p.restDays--;
      });
      
      prepareNextGame();
    }

    function restoreView(){
      if(state.mode === 'title') showTitle();
      else if(state.mode === 'select_starter') prepareNextGame();
      else if(state.mode === 'ceremony') { 
        setCurrentDisplayedNames();
        setNarration('始球式 (First Pitch)','地元のアイドルによる始球式が行われます。<br>スタジアムは大歓声に包まれています！');
        setActions([{label:'プレイボール！',className:'gold',onClick:startGame}], [{label:'保存(JSON)',className:'green',onClick:exportJSON}]);
        renderAll();
      }
      else if(state.mode === 'halftime') showHalftimeEvent();
      else if(state.mode === 'hero') showHeroInterview();
      else if(state.mode === 'ending') showEnding();
      else if(state.mode === 'postgame') { setNarration('試合終了',`現在の成績は ${state.record.w}勝${state.record.l}敗。`); setActions([{label:'次の試合へ',className:'gold',onClick:nextGame}], [{label:'保存(JSON)',className:'green',onClick:exportJSON}]); renderAll(); }
      else {
        setCurrentDisplayedNames();
        if(state.game.offense === 'home'){ setNarration('攻撃采配',`こちらの攻撃です。${state.game.batter} が打席へ。`); showOffenseActions(); }
        else { setNarration('守備采配',`相手打者は ${state.game.batter}。`); showDefenseActions(); }
        renderAll();
      }
    }

    showTitle();
  })();
  </script>
</body>
</html>
